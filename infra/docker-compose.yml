services:
  postgres:
    image: postgres:16-alpine
    container_name: mboahub-postgres
    environment:
      POSTGRES_DB: mboahub
      POSTGRES_USER: mboahub
      POSTGRES_PASSWORD: mboahub123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mboahub -d mboahub"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
